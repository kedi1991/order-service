version: '3.8'

services:
  orders-db:
    image: postgres
    container_name: orders-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=db_orders
    ports:
      - "5433:5432"
    
  order-service:
    image: order-service
    container_name: order-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://orders-db:5432/db_orders
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres

    ports:
      - "8081:8081"
    depends_on:
      - orders-db